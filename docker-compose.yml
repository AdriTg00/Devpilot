services:
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - devpilot

  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5-coder:7b} && echo 'Model pulled successfully'"]
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - devpilot

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - chroma_data:/app/.chroma
      - db_data:/app/.memory
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - OLLAMA_HOST=ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-fast}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - MEMORY_STORAGE_PATH=/app/.memory/conversations.json
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - devpilot

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devpilot

# Optional: NVIDIA GPU for Ollama inference
# Uncomment and add to ollama service:
#   deploy:
#     resources:
#       reservations:
#         devices:
#           - driver: nvidia
#             count: all
#             capabilities: [gpu]

volumes:
  chroma_data:
  db_data:
  ollama_data:

networks:
  devpilot: